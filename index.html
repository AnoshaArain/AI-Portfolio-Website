<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">

</head>
<body>
    

<header>
    <nav class="navbar">
       <nav id="left-line">|</nav> <nav id="title">ANOSHA'S AI PORTFOLIO</nav> <nav id="right-line">|</nav>

    </nav>
</header>

<div class="main-container">

    <!-- Profile Section -->
    <aside class="profile-section">
        
        <div class="profile-top">
        <div class="profile-image">
            <img src="Images/Profile Pic.jpeg" alt="Profile Picture">
        </div>

        <div class="profile-info">

            <p class="profile-name">Anosha Arain</p>

            <p class="profile-role">BSIT STUDENT</p>
        </div>
    </div>
        

        <div class="social-links">
             <a href="https://github.com/AnoshaArain/AI-Portfolio-Website/blob/main/Anosha%20Arain%20Resume%20.pdf" target="_blank" class="link-btn">Resume</a> 
             <a href="https:/www.linkedin.com/in/anosha-arain-4a37663ba" target="_blank" class="link-btn">LinkedIn</a>
             <a href="https://github.com/anoshaarain" target="_blank" class="link-btn">Github</a>
        </div>

    </aside>

    <!-- Chatbot Section -->
    <section class="chatbot-section">

        <!-- Messages -->
        <div class="chat-messages" id="chatMessages">

            <div class="bot-message">
                 Welcome! 👋 Ask me anything about Anosha. 
            </div>

            

        </div>

        <!-- Input Area -->
        <div class="input-section">

            <p class="typing-indicator">
                 <span></span>
                <span></span>
                <span></span>
            </p>

            <div class="input-container">

                <input
                    type="text"
                    id="userInput"
                    placeholder="Ask something about Anosha"
                >

                <button id="sendBtn">
                    ↑
                </button>

            </div>

        </div>

    </section>

</div>
<script src="script.js"></script>
</body>
</html>
